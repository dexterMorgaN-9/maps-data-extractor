<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps Data Extractor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 0;
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
      background: linear-gradient(to right, #fff, #e0e0e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .status-value {
      font-size: 20px;
      font-weight: 700;
    }

    .collecting-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(76, 175, 80, 0.2);
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid rgba(76, 175, 80, 0.4);
    }

    .collecting-indicator.active {
      display: flex;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      background: #4CAF50;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 10px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .data-list {
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 10px;
      margin-top: 15px;
    }

    .data-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      border-left: 3px solid #4CAF50;
    }

    .data-item:last-child {
      margin-bottom: 0;
    }

    .data-item-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .data-item-rating {
      opacity: 0.9;
      font-size: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      opacity: 0.7;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .data-list::-webkit-scrollbar {
      width: 6px;
    }

    .data-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .data-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
    }

    .data-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .warning {
      background: rgba(255, 152, 0, 0.2);
      border: 1px solid rgba(255, 152, 0, 0.4);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }

    .warning.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🗺️ Maps Data Extractor</h1>
      <p>Extract business data with one click</p>
    </div>

    <div class="warning" id="notOnMaps">
      ⚠️ Please open Google Maps to use this extension
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Collected</span>
        <span class="status-value" id="collectedCount">0</span>
      </div>
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value" id="statusText">Ready</span>
      </div>
    </div>

    <div class="collecting-indicator" id="collectingIndicator">
      <div class="pulse-dot"></div>
      <span>Collecting data... Click on businesses in Google Maps</span>
    </div>

    <button class="btn btn-primary" id="toggleCollecting">
      <span id="toggleText">Start Collecting</span>
    </button>

    <div class="btn-group">
      <button class="btn btn-secondary" id="exportCSV">
        <span>📊 Export CSV</span>
      </button>
      <button class="btn btn-secondary" id="exportExcel">
        <span>📗 Export Excel</span>
      </button>
    </div>

    <button class="btn btn-secondary" id="clearData" style="margin-top: 10px;">
      <span>🗑️ Clear All Data</span>
    </button>

    <div class="data-list" id="dataList">
      <div class="empty-state">
        <div class="empty-state-icon">📍</div>
        <div>No data collected yet</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
