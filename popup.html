<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps Data Extractor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 5px;
      background: linear-gradient(to right, #fff, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .warning {
      background: rgba(255, 152, 0, 0.2);
      border: 1px solid rgba(255, 152, 0, 0.5);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }

    .warning.show {
      display: block;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 14px;
      opacity: 0.85;
    }

    .status-value {
      font-size: 22px;
      font-weight: 700;
    }

    .collecting-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: rgba(76, 175, 80, 0.2);
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid rgba(76, 175, 80, 0.4);
      font-size: 13px;
      font-weight: 500;
    }

    .collecting-indicator.active {
      display: flex;
    }

    .pulse-dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      background: #4CAF50;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn:last-of-type {
      margin-bottom: 0;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.28);
      transform: translateY(-1px);
    }

    .data-list {
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 10px;
      margin-top: 16px;
    }

    .data-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 12px;
      border-radius: 7px;
      margin-bottom: 8px;
      font-size: 13px;
      border-left: 3px solid #4CAF50;
    }

    .data-item:last-child {
      margin-bottom: 0;
    }

    .data-item-name {
      font-weight: 600;
      margin-bottom: 3px;
    }

    .data-item-category {
      opacity: 0.85;
      font-size: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 28px 16px;
      opacity: 0.65;
    }

    .empty-state-icon {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .data-list::-webkit-scrollbar       { width: 5px; }
    .data-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.08); border-radius: 10px; }
    .data-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3);  border-radius: 10px; }
    .data-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>🗺️ Maps Data Extractor</h1>
      <p>Auto-collect business data with one click</p>
    </div>

    <div class="warning" id="notOnMaps">
      Open Google Maps to use this extension!
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Collected</span>
        <span class="status-value" id="collectedCount">0</span>
      </div>
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value" id="statusText">Ready</span>
      </div>
    </div>

    <div class="collecting-indicator" id="collectingIndicator">
      <div class="pulse-dot"></div>
      <span>AUTO-COLLECTING...</span>
    </div>

    <button class="btn btn-primary" id="toggleCollecting">
      <span id="toggleText">Start Auto-Collect</span>
    </button>

    <button class="btn btn-secondary" id="exportCSV">
      Export to CSV
    </button>

    <button class="btn btn-secondary" id="clearData">
      Clear All Data
    </button>

    <div class="data-list" id="dataList">
      <div class="empty-state">
        <div class="empty-state-icon">📍</div>
        <div>No data collected yet</div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
